name: Deploy Prod

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/jakhongirodilov/fintrack

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          build-args: VITE_TELEGRAM_BOT_NAME=${{ secrets.PROD_BOT_NAME }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 213.199.53.232
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ghcr.io/jakhongirodilov/fintrack:${{ needs.build.outputs.tag }}
            sed -i "s|ghcr.io/jakhongirodilov/fintrack:sha-[a-f0-9]*|ghcr.io/jakhongirodilov/fintrack:${{ needs.build.outputs.tag }}|" \
              /etc/systemd/system/fintrack.service
            systemctl daemon-reload
            systemctl restart fintrack
